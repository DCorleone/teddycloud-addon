name: Build and Push TeddyCloud Add-on

on:
  push:
    branches:
      - main
    paths:
      - 'teddycloud/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current date
        id: date
        run: echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Build and push (aarch64)
        uses: docker/build-push-action@v5
        with:
          context: ./teddycloud
          platforms: linux/arm64
          push: true
          build-args: |
            BUILD_FROM=ghcr.io/hassio-addons/ubuntu-base/aarch64:11.0.0
            BUILD_ARCH=aarch64
            BUILD_VERSION=0.6.8
            BUILD_NAME=TeddyCloud
            BUILD_DESCRIPTION=TeddyCloud Home Assistant Add-on
            BUILD_REPOSITORY=DCorleone/teddycloud-addon
            BUILD_DATE=${{ steps.date.outputs.date }}
            BUILD_REF=${{ github.sha }}
          tags: |
            ghcr.io/dcorleone/teddycloud-addon:latest
            ghcr.io/dcorleone/teddycloud-addon:0.6.8
